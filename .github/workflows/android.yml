name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_B64 }}
      # We added quotes and the --ignore-garbage flag to handle line breaks securely
      run: |
        echo "$ENCODED_STRING" | base64 --decode --ignore-garbage > keystore.jks
        
    - name: Build and Sign Release APK and AAB
      # We switched back to using standard 'gradle' instead of the missing wrapper
      run: >
        gradle assembleRelease bundleRelease
        -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks
        -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
        -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
        -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk 
        
    - name: Upload Signed Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/*.aab
